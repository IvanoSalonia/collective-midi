<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>Collective MIDI</title>
  <link rel="stylesheet" href="/css/styles.css" />

  <!-- Open standalone (no browser chrome) when added to home screen on iOS. -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Collective MIDI" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#000000" />
  <link rel="manifest" href="/manifest.webmanifest" />
</head>
<body class="audience">
  <!-- Tap-to-start overlay. iOS requires a user gesture for AudioContext
       and DeviceOrientation permission; we fold both into one tap. -->
  <div id="start-overlay">
    <div class="start-inner">
      <div class="start-title">Tap to join</div>
      <div class="start-sub" id="start-sub">Sound + tilt</div>
    </div>
  </div>

  <!-- Full-screen color fill. JS sets backgroundColor to the current
       interpolated channel color; toggling .lit fades opacity. -->
  <div id="color-fill"></div>

  <!-- iPhone-only "Add to Home Screen" hint (only fires on Safari iPhone). -->
  <div id="a2hs-prompt" class="a2hs-prompt hidden">
    <div class="a2hs-text">
      For full screen: tap
      <svg class="a2hs-icon" width="14" height="18" viewBox="0 0 14 18" aria-hidden="true">
        <path fill="currentColor" d="M7 0L4 3l.85.85L6.4 2.3V11h1.2V2.3l1.55 1.55L10 3 7 0zM1 7v10h12V7h-3v1.2h1.8v7.6H2.2V8.2H4V7H1z"/>
      </svg>
      then <strong>Add to Home Screen</strong>
    </div>
    <button class="a2hs-dismiss" aria-label="Dismiss">×</button>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script type="module" src="/js/audience.js"></script>
</body>
</html>
