<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>Collective MIDI</title>
  <link rel="stylesheet" href="/css/styles.css" />

  <!-- Open standalone (no browser chrome) when added to home screen on iOS. -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Collective MIDI" />
  <!-- Same for Android Chrome / generic PWA. -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#000000" />
  <link rel="manifest" href="/manifest.webmanifest" />
</head>
<body class="audience">
  <!-- Tap-to-start overlay. iOS requires a user gesture to (a) unlock AudioContext
       and (b) request DeviceOrientation permission. We fold both into one tap. -->
  <div id="start-overlay">
    <div class="start-inner">
      <div class="start-title">Tap to join</div>
      <div class="start-sub" id="start-sub">Sound + tilt</div>
    </div>
  </div>

  <canvas id="stage"></canvas>

  <!-- Module entry point -->
  <script src="/socket.io/socket.io.js"></script>
  <script type="module" src="/js/audience.js"></script>
</body>
</html>
