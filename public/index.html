<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>Collective MIDI</title>
  <link rel="stylesheet" href="/css/styles.css" />

  <!-- Open standalone (no browser chrome) when added to home screen on iOS. -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Collective MIDI" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#000000" />
  <link rel="manifest" href="/manifest.webmanifest" />
</head>
<body class="audience">
  <!-- Two-step start overlay.
       iOS requires a user gesture to unlock AudioContext and to prompt for
       DeviceOrientation/DeviceMotion permission. We keep that gesture as its
       OWN step ("Tap to start") so the native "Allow" dialog has nothing
       behind it to re-tap. Only once permission is resolved do we reveal the
       group picker, so the audience picks a group exactly once.
       Colors are the default (state A) per-channel palette — the server is
       authoritative and overrides via 'assigned'. -->
  <div id="start-overlay">
    <!-- Step 1: the gesture (unlock audio + request motion permission). -->
    <div class="start-step" id="start-step-begin">
      <div class="start-inner">
        <div class="start-title">Collective MIDI</div>
        <div class="start-sub">Tap to enable motion &amp; sound</div>
        <button class="start-begin" id="start-begin" type="button">Tap to start</button>
      </div>
    </div>

    <!-- Step 2: pick a group (revealed only after permission is resolved). -->
    <div class="start-step hidden" id="start-step-group">
      <div class="start-inner">
        <div class="start-title">Pick your group</div>
        <div class="start-groups">
          <button class="start-group" type="button" data-group="0" style="--c:#42EA33; color:#000">1</button>
          <button class="start-group" type="button" data-group="1" style="--c:#DD1414; color:#fff">2</button>
          <button class="start-group" type="button" data-group="2" style="--c:#FFFFFF; color:#000">3</button>
          <button class="start-group" type="button" data-group="3" style="--c:#1417DD; color:#fff">4</button>
        </div>
        <div class="start-status muted" id="start-status"></div>
      </div>
    </div>
  </div>

  <!-- Full-screen color fill. JS sets backgroundColor to the current
       interpolated channel color; toggling .lit fades opacity. -->
  <div id="color-fill"></div>

  <!-- Top-right HUD: subtle group number (always visible after join) plus a
       small gamma/state readout used for calibrating the tilt thresholds. -->
  <div class="hud">
    <div id="group-badge" class="hud-group"></div>
    <div id="gamma-readout" class="hud-debug"></div>
  </div>

  <!-- Shake-to-mute overlay. Hidden until the audience shakes their phone;
       tapping the button restores audio. Local to this phone only. -->
  <div id="mute-overlay" class="mute-overlay hidden">
    <button class="mute-btn" id="mute-reactivate">
      <div class="mute-btn-label">Muted</div>
      <div class="mute-btn-sub">Tap to reactivate</div>
    </button>
  </div>

  <!-- iPhone-only "Add to Home Screen" hint (only fires on Safari iPhone). -->
  <div id="a2hs-prompt" class="a2hs-prompt hidden">
    <div class="a2hs-text">
      For full screen: tap
      <svg class="a2hs-icon" width="14" height="18" viewBox="0 0 14 18" aria-hidden="true">
        <path fill="currentColor" d="M7 0L4 3l.85.85L6.4 2.3V11h1.2V2.3l1.55 1.55L10 3 7 0zM1 7v10h12V7h-3v1.2h1.8v7.6H2.2V8.2H4V7H1z"/>
      </svg>
      then <strong>Add to Home Screen</strong>
    </div>
    <button class="a2hs-dismiss" aria-label="Dismiss">×</button>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script type="module" src="/js/audience.js"></script>
</body>
</html>
