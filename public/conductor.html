<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Conductor — Collective MIDI</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body class="conductor">
  <header class="bar">
    <div class="bar-left">
      <strong>Conductor</strong>
      <span class="muted" id="status">connecting…</span>
    </div>
    <div class="bar-right">
      <label class="midi-select">
        MIDI input
        <select id="midi-input"><option value="">— none —</option></select>
      </label>
      <label class="rehearsal-toggle" title="Play all 8 groups locally on this laptop, no phones needed">
        <input type="checkbox" id="rehearsal-toggle" />
        Rehearsal
      </label>
      <span class="muted" id="total">0 connected</span>
    </div>
  </header>

  <div class="ch-meter" id="ch-meter" aria-label="MIDI channel activity">
    <div class="ch" data-ch="0"><span>1</span></div>
    <div class="ch" data-ch="1"><span>2</span></div>
    <div class="ch" data-ch="2"><span>3</span></div>
    <div class="ch" data-ch="3"><span>4</span></div>
  </div>

  <section id="groups" class="groups"></section>

  <!-- Sound design admin panel. Channel strips on the left, FX bus + BPM on the right. -->
  <section class="sd-panel" id="sd-panel">
    <div class="sd-channels">
      <!-- Ch1 — synth voice -->
      <div class="sd-strip" data-ch="0">
        <div class="sd-strip-head">
          <span class="sd-strip-num">1</span>
          <span class="sd-strip-label">Synth voice</span>
        </div>
        <label class="sd-row">
          Osc
          <select data-bind="osc">
            <option value="sine">sine</option>
            <option value="sawtooth">saw</option>
            <option value="square">square</option>
          </select>
        </label>
        <label class="sd-row">Cutoff <input type="range" data-bind="cutoff" min="80" max="8000" step="1" /></label>
        <label class="sd-row">Attack <input type="range" data-bind="attack" min="0.001" max="2" step="0.001" /></label>
        <label class="sd-row">Decay  <input type="range" data-bind="decay"  min="0.01"  max="3" step="0.01" /></label>
        <label class="sd-row">Sustain <input type="range" data-bind="sustain" min="0" max="1" step="0.01" /></label>
        <label class="sd-row">Release <input type="range" data-bind="release" min="0.01" max="3" step="0.01" /></label>
        <label class="sd-row">Reverb send <input type="range" data-bind="reverbSend" min="0" max="1" step="0.01" /></label>
        <label class="sd-row">Delay send  <input type="range" data-bind="delaySend"  min="0" max="1" step="0.01" /></label>
      </div>

      <!-- Ch2 — pitched sample -->
      <div class="sd-strip" data-ch="1">
        <div class="sd-strip-head">
          <span class="sd-strip-num">2</span>
          <span class="sd-strip-label">Pitched sample</span>
        </div>
        <div class="sd-drop" data-channel="ch2">
          <div class="sd-drop-label">Drop sample</div>
          <div class="sd-drop-name muted" data-bind="filename">—</div>
        </div>
        <label class="sd-row">Reverb send <input type="range" data-bind="reverbSend" min="0" max="1" step="0.01" /></label>
        <label class="sd-row">Delay send  <input type="range" data-bind="delaySend"  min="0" max="1" step="0.01" /></label>
      </div>

      <!-- Ch3 — noise/texture -->
      <div class="sd-strip" data-ch="2">
        <div class="sd-strip-head">
          <span class="sd-strip-num">3</span>
          <span class="sd-strip-label">Noise / texture</span>
        </div>
        <label class="sd-row">
          Noise
          <select data-bind="noise">
            <option value="white">white</option>
            <option value="pink">pink</option>
            <option value="brown">brown</option>
          </select>
        </label>
        <label class="sd-row">Cutoff <input type="range" data-bind="cutoff" min="80" max="8000" step="1" /></label>
        <label class="sd-row">Attack <input type="range" data-bind="attack" min="0.001" max="2" step="0.001" /></label>
        <label class="sd-row">Decay  <input type="range" data-bind="decay"  min="0.01"  max="3" step="0.01" /></label>
        <label class="sd-row">Sustain <input type="range" data-bind="sustain" min="0" max="1" step="0.01" /></label>
        <label class="sd-row">Release <input type="range" data-bind="release" min="0.01" max="3" step="0.01" /></label>
        <label class="sd-row">Reverb send <input type="range" data-bind="reverbSend" min="0" max="1" step="0.01" /></label>
        <label class="sd-row">Delay send  <input type="range" data-bind="delaySend"  min="0" max="1" step="0.01" /></label>
      </div>

      <!-- Ch4 — sample slicer -->
      <div class="sd-strip" data-ch="3">
        <div class="sd-strip-head">
          <span class="sd-strip-num">4</span>
          <span class="sd-strip-label">Slicer</span>
        </div>
        <div class="sd-drop" data-channel="ch4">
          <div class="sd-drop-label">Drop long sample</div>
          <div class="sd-drop-name muted" data-bind="filename">—</div>
        </div>
        <label class="sd-row">Reverb send <input type="range" data-bind="reverbSend" min="0" max="1" step="0.01" /></label>
        <label class="sd-row">Delay send  <input type="range" data-bind="delaySend"  min="0" max="1" step="0.01" /></label>
      </div>
    </div>

    <div class="sd-fx">
      <div class="sd-fx-head">FX bus</div>
      <label class="sd-row">
        BPM
        <input type="number" id="bpm-input" min="20" max="300" step="1" />
      </label>
      <label class="sd-row">
        Delay step
        <select id="delay-step">
          <option value="1/4">1/4</option>
          <option value="1/8">1/8</option>
          <option value="1/8d">1/8 dotted</option>
          <option value="1/16">1/16</option>
        </select>
      </label>
      <label class="sd-row">Delay feedback <input type="range" id="delay-feedback" min="0" max="0.9" step="0.01" /></label>
      <label class="sd-row">Reverb wet     <input type="range" id="reverb-wet"     min="0" max="1"   step="0.01" /></label>
    </div>
  </section>

  <!-- 16-step sequencer. Four parallel per-channel patterns (one per MIDI
       channel) play to the global BPM. Channel selector on the left, 2 rows
       of 8 steps, 2-octave keyboard below for note selection. -->
  <section class="seq-panel">
    <div class="seq-head">
      <div class="seq-title">Sequencer</div>
      <div class="seq-transport">
        <button id="seq-play">▶ Play</button>
        <button id="seq-clear">Clear channel</button>
      </div>
    </div>
    <div class="seq-grid">
      <div class="seq-channels" id="seq-channels"></div>
      <div class="seq-edit">
        <div class="seq-steps" id="seq-steps"></div>
        <div class="seq-keyboard-wrap">
          <button class="seq-oct" id="seq-oct-down" title="Octave down">◀</button>
          <div class="seq-keyboard" id="seq-keyboard"></div>
          <button class="seq-oct" id="seq-oct-up" title="Octave up">▶</button>
        </div>
      </div>
    </div>
  </section>

  <section class="log-wrap">
    <h3>Live notes</h3>
    <div id="log" class="log"></div>
  </section>

  <script src="/socket.io/socket.io.js"></script>
  <script type="module" src="/js/conductor.js"></script>
</body>
</html>
