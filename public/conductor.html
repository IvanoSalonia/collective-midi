<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Conductor — Collective MIDI</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body class="conductor">
  <header class="bar">
    <div class="bar-left">
      <strong>Conductor</strong>
      <span class="muted" id="status">connecting…</span>
    </div>
    <div class="bar-right">
      <label class="midi-select">
        MIDI input
        <select id="midi-input"><option value="">— none —</option></select>
      </label>
      <label class="rehearsal-toggle" title="Play all 4 groups locally on this laptop, no phones needed">
        <input type="checkbox" id="rehearsal-toggle" />
        Rehearsal
      </label>
      <span class="muted" id="total">0 connected</span>
    </div>
  </header>

  <div class="ch-meter" id="ch-meter" aria-label="MIDI channel activity">
    <div class="ch" data-ch="0"><span>1</span></div>
    <div class="ch" data-ch="1"><span>2</span></div>
    <div class="ch" data-ch="2"><span>3</span></div>
    <div class="ch" data-ch="3"><span>4</span></div>
  </div>

  <section id="groups" class="groups"></section>

  <!-- Sound design admin panel. Each strip has A/B/C tabs for the three
       orientation states; sliders read/write whichever state is selected.
       The audience interpolates between A/B/C live as the phone tilts. -->
  <section class="sd-panel" id="sd-panel">
    <div class="sd-channels">

      <!-- Ch1 — synth voice -->
      <div class="sd-strip" data-ch="0">
        <div class="sd-strip-head" style="--c:#42EA33">
          <span class="sd-strip-num">1</span>
          <span class="sd-strip-label">Synth voice</span>
          <div class="sd-tabs" role="tablist">
            <button class="sd-tab active" data-state="A" title="Portrait">A</button>
            <button class="sd-tab" data-state="B" title="Landscape right">B</button>
            <button class="sd-tab" data-state="C" title="Landscape left">C</button>
          </div>
        </div>

        <div class="sd-section">
          <div class="sd-section-label">Source</div>
          <label class="sd-row">Volume <input type="range" data-bind="volume" min="0" max="1" step="0.01" /></label>
          <label class="sd-row">
            Osc
            <select data-bind="osc">
              <option value="sine">sine</option>
              <option value="sawtooth">saw</option>
              <option value="square">square</option>
            </select>
          </label>
          <label class="sd-row">Detune <input type="range" data-bind="detune" min="0" max="50" step="0.1" /></label>
          <label class="sd-row">Cutoff <input type="range" data-bind="cutoff" min="80" max="8000" step="1" /></label>
        </div>

        <div class="sd-section">
          <div class="sd-section-label">LFO → amp</div>
          <label class="sd-row">Rate  <input type="range" data-bind="lfoRate"  min="0.1" max="20" step="0.1" /></label>
          <label class="sd-row">Depth <input type="range" data-bind="lfoDepth" min="0"   max="1"  step="0.01" /></label>
        </div>

        <div class="sd-section">
          <div class="sd-section-label">ADSR</div>
          <label class="sd-row">A <input type="range" data-bind="attack"  min="0.001" max="2" step="0.001" /></label>
          <label class="sd-row">D <input type="range" data-bind="decay"   min="0.01"  max="3" step="0.01" /></label>
          <label class="sd-row">S <input type="range" data-bind="sustain" min="0"     max="1" step="0.01" /></label>
          <label class="sd-row">R <input type="range" data-bind="release" min="0.01"  max="3" step="0.01" /></label>
        </div>

        <div class="sd-section">
          <div class="sd-section-label">Sends</div>
          <label class="sd-row">Reverb <input type="range" data-bind="reverbSend" min="0" max="1" step="0.01" /></label>
          <label class="sd-row">Delay  <input type="range" data-bind="delaySend"  min="0" max="1" step="0.01" /></label>
        </div>
      </div>

      <!-- Ch2 — sampler -->
      <div class="sd-strip" data-ch="1">
        <div class="sd-strip-head" style="--c:#DD1414">
          <span class="sd-strip-num">2</span>
          <span class="sd-strip-label">Sampler</span>
          <div class="sd-tabs" role="tablist">
            <button class="sd-tab active" data-state="A">A</button>
            <button class="sd-tab" data-state="B">B</button>
            <button class="sd-tab" data-state="C">C</button>
          </div>
        </div>

        <div class="sd-section">
          <div class="sd-section-label">Source</div>
          <div class="sd-drop" data-channel="ch2">
            <div class="sd-drop-label">Drop sample</div>
            <div class="sd-drop-name muted" data-bind="filename">—</div>
          </div>
          <label class="sd-row">Volume <input type="range" data-bind="volume" min="0"  max="1"    step="0.01" /></label>
          <label class="sd-row">Cutoff <input type="range" data-bind="cutoff" min="80" max="8000" step="1"    /></label>
        </div>

        <div class="sd-section">
          <div class="sd-section-label">ADSR</div>
          <label class="sd-row">A <input type="range" data-bind="attack"  min="0.001" max="2" step="0.001" /></label>
          <label class="sd-row">D <input type="range" data-bind="decay"   min="0.01"  max="3" step="0.01" /></label>
          <label class="sd-row">S <input type="range" data-bind="sustain" min="0"     max="1" step="0.01" /></label>
          <label class="sd-row">R <input type="range" data-bind="release" min="0.01"  max="3" step="0.01" /></label>
        </div>

        <div class="sd-section">
          <div class="sd-section-label">Sends</div>
          <label class="sd-row">Reverb <input type="range" data-bind="reverbSend" min="0" max="1" step="0.01" /></label>
          <label class="sd-row">Delay  <input type="range" data-bind="delaySend"  min="0" max="1" step="0.01" /></label>
        </div>
      </div>

      <!-- Ch3 — 2-op FM synth -->
      <div class="sd-strip" data-ch="2">
        <div class="sd-strip-head" style="--c:#FFFFFF">
          <span class="sd-strip-num">3</span>
          <span class="sd-strip-label">FM synth</span>
          <div class="sd-tabs" role="tablist">
            <button class="sd-tab active" data-state="A">A</button>
            <button class="sd-tab" data-state="B">B</button>
            <button class="sd-tab" data-state="C">C</button>
          </div>
        </div>

        <div class="sd-section">
          <div class="sd-section-label">Source</div>
          <label class="sd-row">Volume  <input type="range" data-bind="volume"   min="0"    max="1"  step="0.01" /></label>
          <label class="sd-row">Ratio   <input type="range" data-bind="ratio"    min="0.25" max="16" step="0.25" /></label>
          <label class="sd-row">Mod idx <input type="range" data-bind="modIndex" min="0"    max="10" step="0.1"  /></label>
        </div>

        <div class="sd-section">
          <div class="sd-section-label">LFO → mod idx</div>
          <label class="sd-row">Rate  <input type="range" data-bind="lfoRate"  min="0.1" max="20" step="0.1" /></label>
          <label class="sd-row">Depth <input type="range" data-bind="lfoDepth" min="0"   max="3"  step="0.05" /></label>
        </div>

        <div class="sd-section">
          <div class="sd-section-label">ADSR</div>
          <label class="sd-row">A <input type="range" data-bind="attack"  min="0.001" max="2" step="0.001" /></label>
          <label class="sd-row">D <input type="range" data-bind="decay"   min="0.01"  max="3" step="0.01" /></label>
          <label class="sd-row">S <input type="range" data-bind="sustain" min="0"     max="1" step="0.01" /></label>
          <label class="sd-row">R <input type="range" data-bind="release" min="0.01"  max="3" step="0.01" /></label>
        </div>

        <div class="sd-section">
          <div class="sd-section-label">Sends</div>
          <label class="sd-row">Reverb <input type="range" data-bind="reverbSend" min="0" max="1" step="0.01" /></label>
          <label class="sd-row">Delay  <input type="range" data-bind="delaySend"  min="0" max="1" step="0.01" /></label>
        </div>
      </div>

      <!-- Ch4 — slicer -->
      <div class="sd-strip" data-ch="3">
        <div class="sd-strip-head" style="--c:#1417DD">
          <span class="sd-strip-num">4</span>
          <span class="sd-strip-label">Slicer</span>
          <div class="sd-tabs" role="tablist">
            <button class="sd-tab active" data-state="A">A</button>
            <button class="sd-tab" data-state="B">B</button>
            <button class="sd-tab" data-state="C">C</button>
          </div>
        </div>

        <div class="sd-section">
          <div class="sd-section-label">Source</div>
          <div class="sd-drop" data-channel="ch4">
            <div class="sd-drop-label">Drop long sample</div>
            <div class="sd-drop-name muted" data-bind="filename">—</div>
          </div>
          <label class="sd-row">Volume <input type="range" data-bind="volume"     min="0" max="1"    step="0.01" /></label>
          <label class="sd-row">Start  <input type="range" data-bind="startPoint" min="0" max="0.99" step="0.01" /></label>
          <label class="sd-row">Slices <input type="range" data-bind="sliceCount" min="4" max="72"   step="1"    /></label>
          <label class="sd-row sd-toggle">
            <span>Loop</span>
            <input type="checkbox" data-bind="loop" />
          </label>
        </div>

        <div class="sd-section">
          <div class="sd-section-label">Sends</div>
          <label class="sd-row">Reverb <input type="range" data-bind="reverbSend" min="0" max="1" step="0.01" /></label>
          <label class="sd-row">Delay  <input type="range" data-bind="delaySend"  min="0" max="1" step="0.01" /></label>
        </div>
      </div>

    </div>

    <div class="sd-fx">
      <div class="sd-fx-head">FX bus</div>
      <label class="sd-row">
        BPM
        <input type="number" id="bpm-input" min="20" max="300" step="1" />
      </label>
      <label class="sd-row">
        Delay step
        <select id="delay-step">
          <option value="1/4">1/4</option>
          <option value="1/8">1/8</option>
          <option value="1/8d">1/8 dotted</option>
          <option value="1/16">1/16</option>
        </select>
      </label>
      <label class="sd-row">Delay feedback <input type="range" id="delay-feedback" min="0" max="0.9" step="0.01" /></label>
      <label class="sd-row">Reverb wet     <input type="range" id="reverb-wet"     min="0" max="1"   step="0.01" /></label>

      <!-- Preset save/load. Server settings reset to defaults on every Node
           process restart (incl. Railway redeploys), so use Export to keep a
           snapshot of a tuned config and Import to restore it. -->
      <div class="sd-preset">
        <div class="sd-section-label">Preset</div>
        <div class="sd-preset-buttons">
          <button id="preset-export" class="sd-preset-btn" title="Download current settings as JSON">Export</button>
          <button id="preset-import" class="sd-preset-btn" title="Load settings from a JSON file">Import</button>
        </div>
        <input type="file" id="preset-import-file" accept="application/json,.json" hidden />
      </div>
    </div>
  </section>

  <section class="log-wrap">
    <h3>Live notes</h3>
    <div id="log" class="log"></div>
  </section>

  <script src="/socket.io/socket.io.js"></script>
  <script type="module" src="/js/conductor.js"></script>
</body>
</html>
